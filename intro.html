<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuestra Historia</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            display: flex;
            justify-content: flex-start;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
        }

        #pantalla {
            text-align: left;
            padding: 60px;
            width: 100%;
        }

        .linea {
            font-size: 22px;
            color: #00ff41;
            margin-bottom: 18px;
            min-height: 32px;
            display: block;
            white-space: pre;
        }

        .cursor {
            display: inline-block;
            width: 10px;
            height: 20px;
            background: #00ff41;
            margin-left: 2px;
            vertical-align: middle;
            animation: parpadeo 0.8s step-end infinite;
        }

        @keyframes parpadeo {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0;
            }
        }

        #pantalla-final {
            display: none;
            width: 100%;
            text-align: center;
            padding: 40px;
        }

        #btn-probar {
            font-family: 'Courier New', Courier, monospace;
            font-size: 32px;
            color: #00ff41;
            background: none;
            border: none;
            cursor: default;
            letter-spacing: 2px;
            opacity: 0;
            transition: opacity 1s;
            text-align: center;
            line-height: 1.6;
        }

        #btn-probar.visible {
            opacity: 1;
        }

        #btn-probar .brillante {
            color: #00ff41;
            text-shadow: 0 0 18px #00ff41, 0 0 40px #00ff41;
            font-weight: bold;
            cursor: pointer;
            text-decoration: underline;
        }

        #btn-probar .brillante:hover {
            text-shadow: 0 0 30px #00ff41, 0 0 60px #00ff41;
        }

        #canvas-bg {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
            opacity: 0.07;
        }
    </style>
</head>

<body>

    <canvas id="canvas-bg"></canvas>

    <div id="pantalla">
        <span class="linea" id="l0"></span>
        <span class="linea" id="l1"></span>
        <span class="linea" id="l2"></span>
        <span class="linea" id="l3"></span>
        <span class="linea" id="l4"></span>
    </div>

    <div id="pantalla-final">
        <div id="btn-probar">
            ¿Te atreves a <span class="brillante" onclick="entrarJuego()">probar</span>?
        </div>
    </div>

    <script>
        // Fondo Matrix
        const canvas = document.getElementById('canvas-bg');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        const cols = Math.floor(canvas.width / 20);
        const drops = Array(cols).fill(1);
        function drawMatrix() {
            ctx.fillStyle = 'rgba(0,0,0,0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#00ff41';
            ctx.font = '15px Courier New';
            drops.forEach((y, i) => {
                const char = String.fromCharCode(0x30A0 + Math.random() * 96);
                ctx.fillText(char, i * 20, y * 20);
                if (y * 20 > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            });
        }
        setInterval(drawMatrix, 50);

        const mensajes = [
            'Despierta, Aitor',
            'He estado trabajando en algo muy especial para ti',
            'Espero que lo disfrutes mucho',
            'Sigue al césar y llegarás a la alegría de la poesía',
            'Te amo 💖'
        ];

        const textos = ['', '', '', '', ''];
        let lineaEscribiendo = 0;
        let charActual = 0;
        let lineaBorrando = mensajes.length - 1;

        function renderTodo(lineaCursor) {
            for (let i = 0; i < mensajes.length; i++) {
                const el = document.getElementById('l' + i);
                if (i === lineaCursor) {
                    el.innerHTML = textos[i] + '<span class="cursor"></span>';
                } else {
                    el.innerHTML = textos[i];
                }
            }
        }

        function escribir() {
            if (lineaEscribiendo >= mensajes.length) {
                // Terminó de escribir todo, pausa y empieza a borrar
                renderTodo(-1);
                lineaBorrando = mensajes.length - 1;
                setTimeout(borrar, 2500);
                return;
            }

            const texto = mensajes[lineaEscribiendo];

            if (charActual < texto.length) {
                textos[lineaEscribiendo] += texto[charActual];
                charActual++;
                renderTodo(lineaEscribiendo);
                setTimeout(escribir, 55);
            } else {
                // Línea terminada, pausa larga antes de la siguiente
                renderTodo(lineaEscribiendo);
                lineaEscribiendo++;
                charActual = 0;
                setTimeout(escribir, 2000);
            }
        }

        function borrar() {
            if (lineaBorrando < 0) {
                setTimeout(mostrarFinal, 400);
                return;
            }

            if (textos[lineaBorrando].length > 0) {
                textos[lineaBorrando] = textos[lineaBorrando].slice(0, -1);
                renderTodo(lineaBorrando);
                setTimeout(borrar, 30);
            } else {
                // Línea vacía, ir a la anterior
                document.getElementById('l' + lineaBorrando).innerHTML = '';
                lineaBorrando--;
                if (lineaBorrando >= 0) {
                    renderTodo(lineaBorrando);
                }
                setTimeout(borrar, 80);
            }
        }

        function mostrarFinal() {
            document.getElementById('pantalla').style.display = 'none';
            const final = document.getElementById('pantalla-final');
            final.style.display = 'block';
            document.body.style.justifyContent = 'center';
            document.body.style.alignItems = 'center';

            setTimeout(() => {
                document.getElementById('btn-probar').classList.add('visible');
            }, 400);
        }

        function entrarJuego() {
            document.body.style.transition = 'opacity 0.8s';
            document.body.style.opacity = '0';
            setTimeout(() => { window.location.href = 'index.html'; }, 800);
        }

        setTimeout(escribir, 800);
    </script>

</body>

</html>
