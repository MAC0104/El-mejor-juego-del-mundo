<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuestra Historia</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #000;
            font-family: 'Courier New', Courier, monospace;
        }

        canvas {
            image-rendering: pixelated;
        }
    </style>
</head>

<body>
    <script src="src/MenuScene.js"></script>
    <script src="src/HubScene.js"></script>
    <script src="src/GameScene.js"></script>
    <script src="src/InstitutoScene.js"></script>
    <script src="src/PasilloScene.js"></script>
    <script src="src/StairsScene.js"></script>
    <script src="src/PatioScene.js"></script>
    <script src="src/ConversacionScene.js"></script>
    <script src="src/CelosScene.js"></script>
    <script src="src/SilencioScene.js"></script>
    <script src="src/SofaScene.js"></script>

    <script>
        const config = {
            type: Phaser.AUTO,
            width: 800,
            height: 400,
            physics: {
                default: 'arcade',
                arcade: {
                    gravity: { y: 2500 },
                    debug: false
                }
            },
            scene: [MenuScene, HubScene, GameScene, InstitutoScene, PasilloScene, StairsScene, PatioScene, ConversacionScene, CelosScene, SilencioScene]
        };

        const game = new Phaser.Game(config);
    </script>
</body>

</html>
